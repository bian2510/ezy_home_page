# EzyHome storefront — nginx SPA server block.
# Mounted at /etc/nginx/conf.d/default.conf by the Dockerfile.
# Acceptance ref: F001 / Task 015, spec BR-009 and AC-9.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults for a static SPA.
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    server_tokens off;

    # Hashed assets (Vite emits content-hashed filenames in /assets/* and at the
    # root for fonts/images). Immutable for 1 year — safe because filenames
    # change on every rebuild.
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|png|jpe?g|gif|ico|svg|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html must never be cached so re-deploys take effect immediately
    # for returning visitors (their cached HTML would otherwise pin them to old
    # asset hashes).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # SPA routing — every unknown path falls back to index.html so
    # React Router can resolve /productos/:id, /blog/:slug, /carrito, etc.
    # on direct reload (spec AC-9).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Friendly 404 fallback in the unlikely case try_files cannot resolve.
    error_page 404 /index.html;
}
